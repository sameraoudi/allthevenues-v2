---
deployment:
  tasks:
    - export DEPLOYPATH=/home1/sameraou/atv-staging
    # NEVER use -a: it clobbers perms on this host. Use explicit flags only.
    # .htaccess IS deployed here — it is our versioned security config.
    # --exclude='db': migration tooling runs from the repo checkout
    # (~/repositories/allthevenues-v2/db), never from the doc root.
    - /usr/bin/rsync -rlt --no-perms --no-owner --no-group --exclude='.git' --exclude='.gitignore' --exclude='.cpanel.yml' --exclude='db' ./ $DEPLOYPATH/
    - /bin/date > $DEPLOYPATH/.last_deploy
